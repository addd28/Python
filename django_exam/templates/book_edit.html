
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sửa sách</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <div class="card p-4 shadow">

        <h2 class="mb-4">Sửa sách</h2>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="mb-3">
                <label>Tiêu đề</label>
                <input
                    type="text"
                    name="title"
                    class="form-control"
                    value="{{ book.title }}"
                >
            </div>

            <div class="mb-3">
                <label>Tác giả</label>
                <input
                    type="text"
                    name="author"
                    class="form-control"
                    value="{{ book.author }}"
                >
            </div>

            <div class="mb-3">
                <label>Giá</label>
                <input
                    type="number"
                    step="0.01"
                    name="price"
                    class="form-control"
                    value="{{ book.price }}"
                >
            </div>

            <div class="mb-3">
                <label>Mô tả</label>

                <textarea
                    name="description"
                    class="form-control"
                >{{ book.description }}</textarea>
            </div>

            <div class="mb-3">

                <label>Ảnh hiện tại</label>

                <br>

                {% if book.image %}
                    <img src="{{ book.image.url }}" width="120">
                {% endif %}

            </div>

            <div class="mb-3">
                <label>Ảnh mới</label>
                <input type="file" name="image" class="form-control">
            </div>

            <button class="btn btn-warning">
                Cập nhật
            </button>

            <a href="/books/" class="btn btn-secondary">
                Quay lại
            </a>

        </form>

    </div>

</body>
</html>
